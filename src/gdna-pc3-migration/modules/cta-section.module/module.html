<section class="cta-section cta-section--{{ module.style }}" aria-labelledby="cta-heading">
  <div class="container cta-section__inner">
    <div class="cta-section__content">
      <h2 id="cta-heading" class="cta-section__heading">{{ module.heading }}</h2>
      {% if module.description %}
        <p class="cta-section__desc">{{ module.description }}</p>
      {% endif %}
    </div>
    {% if module.cta_url %}
      <a href="{{ module.cta_url }}" class="btn btn--primary cta-section__btn">
        {{ module.cta_text }}
      </a>
    {% endif %}
  </div>
</section>
